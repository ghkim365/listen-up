<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyPlayer Premium UI</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter and Noto Sans KR for better typography -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'background': '#111317',
            'charcoal-dark': '#111317',
            'charcoal-light': '#1a1c20',
            'scholar-blue': '#adc6ff',
            'scholar-border': 'rgba(255, 255, 255, 0.08)',
            'muted-coral': 'rgba(255, 180, 171, 0.12)',
            'text-coral': '#ffb4ab',
            'on-surface-variant': '#c1c6d7',
            'outline-variant': '#414755',
            'premium-red': '#ff3b30',
          },
          fontFamily: {
            sans: ['Inter', 'Noto Sans KR', 'sans-serif'],
          },
        },
      },
    };
  </script>
<style data-purpose="custom-styles">
    body {
      background-color: #000;
      color: #e2e2e8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .device-shadow {
      box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 0 12px #222, 0 0 0 14px #333;
    }

    .premium-card {
      background: #1e2024;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      background-color: #1e2024;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .btn-icon:hover {
      background-color: #333539;
    }

    .glow-blue {
      box-shadow: 0 0 12px rgba(173, 198, 255, 0.2);
      border: 1px solid rgba(173, 198, 255, 0.4) !important;
    }

    .btn-page {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9999px;
      font-size: 0.875rem;
      color: #9ca3af;
      flex-shrink: 0;
    }

    .btn-page-active {
      background-color: #333539;
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
<!-- BEGIN: DeviceContainer - Increased width to 430px for better layout space -->
<div class="relative h-[844px] bg-background rounded-[50px] device-shadow overflow-hidden flex flex-col font-sans border-[1px] border-white/5 overflow-x-hidden w-[430px]" data-purpose="ios-frame">
<!-- BEGIN: TopStatusArea -->
<div class="h-10 w-full flex justify-center items-end pb-1 shrink-0" data-purpose="notch-area">
<div class="w-28 h-6 bg-black rounded-b-2xl"></div>
</div>
<!-- END: TopStatusArea -->
<!-- BEGIN: TopToolbar -->
<header class="px-4 py-3 flex flex-col gap-4 shrink-0" data-purpose="header-section">
<div class="flex items-center justify-between gap-1">
<!-- Progress Counter: Horizontal alignment fixed -->
<div class="flex items-baseline whitespace-nowrap" data-purpose="progress-display">
<span class="text-scholar-blue text-xl font-bold">1</span>
<span class="text-gray-500 text-sm font-medium mx-0.5">/</span>
<span class="text-gray-500 text-sm font-medium">23</span>
<span class="text-gray-600 text-xs ml-1.5 font-medium">[0]</span>
</div>
<!-- Utility Buttons: Ensuring all 9 icons fit -->
<div class="flex items-center gap-1" data-purpose="utility-toolbar">
<div class="px-2 py-1 bg-scholar-blue/10 text-scholar-blue text-[11px] font-bold rounded-full border border-scholar-blue/20 flex items-center justify-center min-w-[36px]">1.1x</div>
<!-- Help -->
<button class="btn-icon"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<!-- Lightning -->
<button class="btn-icon"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<!-- Swap -->
<button class="btn-icon"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<!-- Repeat -->
<button class="btn-icon"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<!-- Play -->
<button class="btn-icon"><svg class="w-4 h-4 text-gray-400" fill="currentColor" viewbox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg></button>
<!-- Edit -->
<button class="btn-icon"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<!-- Star (Bookmark) -->
<button class="btn-icon"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
</div>
</div>
<!-- Top Progress Bar Container -->
<div class="w-full h-[2px] bg-white/5 relative" data-purpose="top-indicator">
<div class="absolute left-0 top-0 h-full w-[4%] bg-scholar-blue shadow-[0_0_8px_rgba(173,198,255,0.6)]"></div>
</div>
</header>
<!-- END: TopToolbar -->
<!-- BEGIN: MainContent -->
<main class="flex-grow px-5 py-2 overflow-y-auto hide-scrollbar" data-purpose="main-display">
<!-- Info Card -->
<div class="premium-card rounded-3xl p-6 min-h-[140px] flex flex-col justify-between" data-purpose="lesson-info-card">
<div class="flex justify-between items-center">
<span class="text-xs font-medium text-gray-500 uppercase tracking-wider">전 체</span>
<!-- Vivid Premium Red Badge -->
<div class="flex items-center gap-1 px-3 py-1 rounded-full bg-premium-red/20 border border-premium-red/40 shadow-[0_0_8px_rgba(255,59,48,0.3)]">
<svg class="w-3.5 h-3.5 text-premium-red" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"></path></svg>
<span class="text-[11px] font-bold text-premium-red whitespace-nowrap">1회</span>
</div>
</div>
<h1 class="mt-4 flex items-center gap-3 text-[19px] font-bold text-white leading-tight whitespace-nowrap overflow-hidden">
<span class="text-xl flex-shrink-0">📖</span>
<span class="flex-grow truncate">StudyPlayer 기본 조작법 (학습 시작하기)</span>
</h1>
</div>
<!-- Blank Space for Video/Content Content -->
<div class="mt-8 flex items-center justify-center h-48 opacity-10">
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: PaginationControls -->
<section class="py-4 border-t border-scholar-border px-4 shrink-0" data-purpose="pagination-controls">
<div class="flex items-center justify-between gap-1">
<!-- Nav First/Prev -->
<div class="flex gap-1.5 shrink-0">
<button class="btn-page text-scholar-blue border-scholar-blue/20">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M11 19l-7-7 7-7m8 14l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<button class="btn-page text-white border-white/10">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
<!-- Page Numbers -->
<div class="flex gap-1.5 items-center">
<button class="btn-page btn-page-active">1</button>
<button class="btn-page">2</button>
<button class="btn-page">3</button>
<button class="btn-page">4</button>
</div>
<!-- Answer / Next / Last -->
<div class="flex gap-1.5 items-center shrink-0">
<button class="px-6 h-[36px] flex items-center justify-center text-[13px] font-bold text-scholar-blue premium-card glow-blue rounded-full border border-scholar-blue/30 whitespace-nowrap" data-purpose="answer-button">
    정답
</button>
<button class="btn-page text-scholar-blue border-scholar-blue/20">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M13 5l7 7-7 7M5 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div></div>
</section>
<!-- END: PaginationControls -->
<!-- BEGIN: BottomNavigation -->
<footer class="h-20 bg-charcoal-light border-t border-scholar-border flex items-center justify-between px-8 shrink-0" data-purpose="main-nav">
<!-- Nav Item: Study (Active) -->
<button class="flex flex-col items-center gap-1 group">
<div class="relative w-7 h-7 flex items-center justify-center">
<svg class="w-6 h-6 text-scholar-blue" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-bold text-scholar-blue">학습</span>
</button>
<!-- Nav Item: List -->
<button class="flex flex-col items-center gap-1 opacity-60">
<div class="w-7 h-7 flex items-center justify-center">
<svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M4 6h16M4 12h16m-7 6h7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-medium text-gray-400">목록</span>
</button>
<!-- Nav Item: Add -->
<button class="flex flex-col items-center gap-1 opacity-60">
<div class="w-7 h-7 flex items-center justify-center">
<svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-medium text-gray-400">추가</span>
</button>
<!-- Nav Item: Settings -->
<button class="flex flex-col items-center gap-1 opacity-60">
<div class="w-7 h-7 flex items-center justify-center">
<svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-medium text-gray-400">설정</span>
</button>
</footer>
<!-- END: BottomNavigation -->
<!-- iOS Home Indicator -->
<div class="h-1.5 w-32 bg-white/20 rounded-full mx-auto mb-2 mt-auto shrink-0"></div>
</div>
<!-- END: DeviceContainer -->
</body></html>
