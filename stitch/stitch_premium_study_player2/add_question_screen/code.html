<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Premium Scholar - Add Question</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            appBackground: '#16181D',
            cardBackground: '#1F2228',
            accentBlue: '#3B82F6',
            accentCyan: '#06B6D4',
            mutedText: '#9CA3AF',
            inputBorder: '#2D3139',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-scrollbars">
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
<style data-purpose="layout-adjustments">
    body {
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    /* Simulating a mobile frame */
    .iphone-frame {
      width: 390px;
      height: 844px;
      background-color: #16181D;
      border: 8px solid #333;
      border-radius: 40px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .status-bar-notch {
      width: 160px;
      height: 30px;
      background: #333;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      z-index: 50;
    }
  </style>
</head>
<body>
<!-- BEGIN: Main Mobile Frame -->
<div class="iphone-frame">
<div class="status-bar-notch"></div>
<!-- BEGIN: Header -->
<header class="pt-12 px-6 pb-4 flex items-center justify-between" data-purpose="app-header">
<h1 class="text-2xl font-bold text-white">문제 추가</h1>
<!-- Tab Toggles -->
<div class="flex bg-[#0D0F12] rounded-lg p-1 text-sm font-medium" data-purpose="input-type-tabs">
<button class="px-3 py-1.5 rounded-md bg-[#1F2228] text-accentBlue">개별 입력</button>
<button class="px-3 py-1.5 rounded-md text-gray-400">대량 불러오기</button>
</div>
<!-- Close Button -->
<button aria-label="Close" class="text-white hover:opacity-70 transition-opacity">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content Area -->
<main class="flex-1 overflow-y-auto px-6 py-4 no-scrollbar" data-purpose="content-scroll-area">
<!-- Input Mode Selection -->
<section class="mb-8" data-purpose="input-mode-section">
<h2 class="text-gray-400 text-sm font-semibold mb-3">입력 모드</h2>
<div class="grid grid-cols-2 gap-3">
<button class="py-3 px-2 rounded-xl border border-accentBlue/30 bg-accentBlue/10 text-accentBlue text-sm font-medium">
            문제 형식 (①~⑤)
          </button>
<button class="py-3 px-2 rounded-xl bg-cardBackground text-gray-300 text-sm font-medium">
            암기 노트 (내용 중심)
          </button>
</div>
</section>
<!-- Subject Selection -->
<section class="mb-8" data-purpose="subject-selection">
<div class="flex items-center gap-2 mb-3">
<svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<h2 class="text-gray-400 text-sm font-semibold">과목(카테고리) 선택</h2>
</div>
<div class="flex gap-2">
<div class="relative flex-1">
<select class="w-full bg-cardBackground border-none rounded-xl text-white py-3 px-4 appearance-none focus:ring-1 focus:ring-accentBlue" data-purpose="subject-dropdown">
<option>도움말</option>
<option>수학</option>
<option>영어</option>
<option>과학</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
<svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
</div>
<button class="px-4 py-3 bg-cardBackground border border-accentBlue/20 rounded-xl text-accentBlue text-sm font-medium whitespace-nowrap">
            과목 추가
          </button>
</div>
</section>
<!-- Question Content Area -->
<section class="mb-8" data-purpose="question-content">
<div class="flex items-center gap-2 mb-3">
<span class="text-gray-400 font-bold">T</span>
<h2 class="text-gray-400 text-sm font-semibold">문제 내용</h2>
</div>
<div class="w-full h-64 bg-cardBackground border border-inputBorder rounded-2xl p-4" data-purpose="text-input-container">
<textarea class="w-full h-full bg-transparent border-none text-gray-500 resize-none focus:ring-0 placeholder-gray-600" placeholder="학습할 질문을 입력하세요"></textarea>
</div>
</section>
</main>
<!-- END: Main Content Area -->
<!-- BEGIN: Bottom Navigation -->
<footer class="bg-[#16181D] border-t border-gray-800/50 px-6 py-4 flex justify-between items-center" data-purpose="bottom-navigation">
<!-- Study Item -->
<button class="flex flex-col items-center gap-1 group">
<svg class="h-7 w-7 text-gray-500 group-hover:text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<span class="text-[10px] text-gray-500">학습</span>
</button>
<!-- List Item -->
<button class="flex flex-col items-center gap-1 group">
<svg class="h-7 w-7 text-gray-500 group-hover:text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 6h16M4 12h16M4 18h7" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<span class="text-[10px] text-gray-500">목록</span>
</button>
<!-- Add Item (Active) -->
<button class="flex flex-col items-center gap-1">
<div class="relative">
<svg class="h-8 w-8 text-accentBlue" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] text-accentBlue font-medium">추가</span>
</button>
<!-- Settings Item -->
<button class="flex flex-col items-center gap-1 group">
<svg class="h-7 w-7 text-gray-500 group-hover:text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<span class="text-[10px] text-gray-500">설정</span>
</button>
</footer>
<!-- END: Bottom Navigation -->
<!-- iPhone Home Indicator -->
<div class="h-1.5 w-32 bg-gray-600/30 mx-auto mb-2 rounded-full"></div>
</div>
<!-- END: Main Mobile Frame -->
</body></html>
