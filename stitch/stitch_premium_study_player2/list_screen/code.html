<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Premium Scholar - List Screen</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration for custom colors -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              charcoal: '#16181D',
              card: '#1F2229',
              accent: '#38BDF8', // Light blue/cyan
              textMuted: '#94A3B8',
              iconGrey: '#64748B',
              danger: '#EF4444'
            }
          }
        }
      }
    }
  </script>
<!-- Custom Styles for specific UI elements -->
<style data-purpose="custom-layout">
    body {
      background-color: #000; /* Outer background to simulate phone frame if needed */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* Hide scrollbar but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen text-white">
<!-- BEGIN: MobileDeviceContainer -->
<div class="relative w-full max-w-[430px] h-[932px] bg-brand-charcoal overflow-hidden flex flex-col shadow-2xl" data-purpose="mobile-container">
<!-- BEGIN: TopNavigation -->
<header class="px-6 pt-12 pb-4 flex items-center justify-between" data-purpose="header-section">
<h1 class="text-2xl font-bold">목록</h1>
<div class="flex gap-4">
<button aria-label="Share" class="p-2">
<svg class="text-gray-400 opacity-70" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" x2="12" y1="2" y2="15"></line></svg>
</button>
<button aria-label="Close" class="p-2">
<svg class="text-gray-400" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
</button>
</div>
</header>
<!-- END: TopNavigation -->
<!-- BEGIN: CategoryTabs -->
<nav class="px-6 border-b border-gray-800" data-purpose="category-tabs">
<div class="flex gap-6 overflow-x-auto no-scrollbar whitespace-nowrap text-brand-textMuted font-semibold">
<div class="flex flex-col items-center">
<button class="py-2 text-brand-accent">전체</button>
<div class="h-0.5 w-full bg-brand-accent"></div>
</div>
<button class="py-2 hover:text-white transition-colors">도움말</button>
<button class="py-2 hover:text-white transition-colors">상식 퀴즈</button>
<button class="py-2 hover:text-white transition-colors">실무</button>
<button class="py-2 hover:text-white transition-colors">행정처분</button>
</div>
</nav>
<!-- END: CategoryTabs -->
<!-- BEGIN: MainContent -->
<main class="flex-1 overflow-y-auto px-6 py-4 space-y-6" data-purpose="main-list-content">
<!-- Search Bar -->
<div class="relative" data-purpose="search-bar">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</span>
<input class="w-full bg-brand-card border-none rounded-2xl py-3 pl-12 pr-4 text-sm text-white placeholder-gray-500 focus:ring-1 focus:ring-brand-accent" placeholder="검색어 입력..." type="text"/>
</div>
<!-- Filter Chips -->
<div class="flex gap-3" data-purpose="filter-chips">
<button class="px-4 py-1.5 bg-brand-card rounded-full text-sm font-medium text-gray-500">모두</button>
<button class="px-4 py-1.5 bg-brand-card rounded-full text-sm font-bold border border-gray-700">중요</button>
<button class="px-4 py-1.5 bg-brand-card rounded-full text-sm font-bold border border-gray-700">틀린 문제</button>
</div>
<!-- Study List Cards -->
<div class="space-y-4" data-purpose="study-list">
<!-- BEGIN: StudyCard1 -->
<div class="bg-brand-card rounded-3xl p-6 relative group" data-purpose="study-card">
<div class="flex justify-between items-start">
<div class="space-y-1">
<span class="text-xs font-semibold text-brand-accent">도움말</span>
<h3 class="text-lg font-bold leading-tight pr-12">
                📖 StudyPlayer 기본<br/>조작법 (학습 시작하기)
              </h3>
<div class="mt-3">
<span class="bg-red-950/30 text-red-400 text-[10px] font-bold px-2 py-0.5 rounded-md">X 1</span>
</div>
</div>
<!-- Action Icons -->
<div class="flex gap-3 text-brand-iconGrey">
<button class="hover:text-white"><svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
<button class="hover:text-brand-accent"><svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></button>
<button class="hover:text-brand-danger"><svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
</div>
</div>
</div>
<!-- END: StudyCard1 -->
<!-- BEGIN: StudyCard2 -->
<div class="bg-brand-card rounded-3xl p-6 relative group" data-purpose="study-card">
<div class="flex justify-between items-start">
<div class="space-y-1">
<span class="text-xs font-semibold text-brand-accent">도움말</span>
<h3 class="text-lg font-bold leading-tight pr-12">
                📱 모바일 제스처 및 이<br/>동 방법
              </h3>
<div class="mt-3">
<svg class="text-brand-accent" fill="currentColor" height="16" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
</div>
</div>
<!-- Action Icons -->
<div class="flex gap-3 text-brand-iconGrey">
<button class="hover:text-white"><svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
<button class="text-brand-accent"><svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></button>
<button class="hover:text-brand-danger"><svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
</div>
</div>
</div>
<!-- END: StudyCard2 -->
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNavigation -->
<footer class="bg-brand-charcoal border-t border-gray-800 safe-area-bottom" data-purpose="bottom-nav">
<div class="flex justify-around items-center h-20">
<!-- Study Link -->
<a class="flex flex-col items-center gap-1 text-gray-500" href="#">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
<span class="text-[10px] font-bold">학습</span>
</a>
<!-- List Link (Active) -->
<a class="flex flex-col items-center gap-1 text-brand-accent" href="#">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><line x1="8" x2="21" y1="6" y2="6"></line><line x1="8" x2="21" y1="12" y2="12"></line><line x1="8" x2="21" y1="18" y2="18"></line><line x1="3" x2="3.01" y1="6" y2="6"></line><line x1="3" x2="3.01" y1="12" y2="12"></line><line x1="3" x2="3.01" y1="18" y2="18"></line></svg>
<span class="text-[10px] font-bold">목록</span>
</a>
<!-- Add Link -->
<a class="flex flex-col items-center gap-1 text-gray-500" href="#">
<div class="rounded-full border-2 border-current p-0.5">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
</div>
<span class="text-[10px] font-bold">추가</span>
</a>
<!-- Settings Link -->
<a class="flex flex-col items-center gap-1 text-gray-500" href="#">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
<span class="text-[10px] font-bold">설정</span>
</a>
</div>
</footer>
<!-- END: BottomNavigation -->
</div>
<!-- END: MobileDeviceContainer -->
</body></html>
