<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings - Premium Scholar v2</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Awesome for Icons (using CDN) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style data-purpose="custom-theme">
    /* Premium Scholar v2 dark theme colors */
    :root {
      --bg-dark: #121212;
      --bg-card: #16181D; /* Slightly lightened charcoal */
      --accent-blue: #38BDF8;
      --text-main: #E5E7EB;
      --text-dim: #9CA3AF;
      --border-color: #2D2F36;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    }

    /* Custom range slider styling */
    input[type='range'] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type='range']::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      background: #374151;
      border-radius: 3px;
    }

    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: var(--accent-blue);
      cursor: pointer;
      margin-top: -7px;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }

    /* Scrollbar hide for clean mobile look */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            scholar: {
              dark: '#121212',
              card: '#16181D',
              blue: '#38BDF8',
              border: '#2D2F36'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="flex flex-col h-screen overflow-hidden">
<!-- BEGIN: Header -->
<header class="flex items-center justify-between px-6 py-4 bg-scholar-dark shrink-0">
<h1 class="text-2xl font-bold">설정</h1>
<button class="text-gray-400 hover:text-white">
<i class="fa-solid fa-xmark text-2xl"></i>
</button>
</header>
<!-- END: Header -->
<!-- BEGIN: Scrollable Content Container -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24 px-4 space-y-8">
<!-- BEGIN: Section 1 - Study Mode & Font (Based on IMAGE_11) -->
<section class="space-y-6" data-purpose="study-and-font-settings">
<!-- Study Mode -->
<div class="space-y-3">
<h3 class="text-sm font-semibold text-gray-400 ml-1">학습 모드</h3>
<div class="grid grid-cols-3 gap-3">
<button class="py-3 px-4 rounded-xl border border-scholar-blue text-scholar-blue font-medium bg-scholar-blue/5">전체</button>
<button class="py-3 px-4 rounded-xl border border-scholar-border text-gray-300 font-medium bg-scholar-card">오답</button>
<button class="py-3 px-4 rounded-xl border border-scholar-border text-gray-300 font-medium bg-scholar-card">즐겨찾기</button>
</div>
</div>
<!-- Font Selection -->
<div class="space-y-3">
<h3 class="text-sm font-semibold text-gray-400 ml-1">글꼴</h3>
<div class="grid grid-cols-2 gap-3">
<button class="py-4 rounded-xl border border-scholar-border text-gray-300 font-medium bg-scholar-card">Pretendard</button>
<button class="py-4 rounded-xl border border-scholar-border text-gray-300 font-medium bg-scholar-card">나눔스퀘어</button>
<button class="py-4 rounded-xl border border-scholar-blue text-scholar-blue font-medium bg-scholar-blue/5">Noto Sans KR</button>
<button class="py-4 rounded-xl border border-scholar-border text-gray-300 font-medium bg-scholar-card">에스코어 드림</button>
<button class="py-4 rounded-xl border border-scholar-border text-gray-300 font-medium bg-scholar-card text-xs">인천교육자람체</button>
<button class="py-4 rounded-xl border border-scholar-border text-gray-300 font-medium bg-scholar-card">온글잎</button>
</div>
</div>
<!-- Font Size Slider -->
<div class="space-y-4">
<div class="flex justify-between items-end px-1">
<label class="text-sm font-semibold text-gray-400">글자 크기 (현재 권장: 16px)</label>
<span class="text-scholar-blue font-bold">15px</span>
</div>
<div class="px-1">
<input class="w-full" max="30" min="10" type="range" value="15"/>
</div>
</div>
</section>
<!-- END: Section 1 -->
<!-- BEGIN: Section 2 - Voice & Data Backup (Based on IMAGE_10) -->
<section class="space-y-8" data-purpose="voice-and-backup-settings">
<!-- Voice Engine -->
<div class="space-y-3">
<h3 class="text-sm font-semibold text-gray-400 ml-1">음성 엔진 (Robotic vs Premium)</h3>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center py-3 px-4 rounded-xl border border-scholar-border bg-scholar-card">
<span class="font-bold text-white">Premium (Edge)</span>
<span class="text-[10px] text-gray-500">자연스러운 고음질</span>
</button>
<button class="flex flex-col items-center justify-center py-3 px-4 rounded-xl border border-scholar-blue bg-scholar-blue/5">
<span class="font-bold text-scholar-blue">기본 (Browser)</span>
<span class="text-[10px] text-scholar-blue/70">오프라인/기본</span>
</button>
</div>
</div>
<!-- Voice Speed -->
<div class="space-y-4">
<div class="flex justify-between items-end px-1">
<label class="text-sm font-semibold text-gray-400">음성 속도</label>
<span class="text-scholar-blue font-bold">1.1x</span>
</div>
<div class="px-1">
<input class="w-full" max="2.0" min="0.5" step="0.1" type="range" value="1.1"/>
</div>
</div>
<!-- Voice Test Button -->
<button class="w-full py-4 rounded-xl border border-scholar-border bg-scholar-card flex items-center justify-center space-x-2 text-scholar-blue font-bold">
<i class="fa-solid fa-volume-high"></i>
<span>음성테스트</span>
</button>
<!-- Data & Design Backup -->
<div class="space-y-3 pt-4 border-t border-scholar-border">
<h3 class="text-sm font-semibold text-gray-400 ml-1">데이터 및 디자인 백업</h3>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center space-x-2 py-4 rounded-xl bg-scholar-card border border-scholar-border font-bold">
<i class="fa-solid fa-download text-sm"></i>
<span>데이터 내보내기</span>
</button>
<button class="flex items-center justify-center space-x-2 py-4 rounded-xl bg-scholar-card border border-scholar-border font-bold">
<i class="fa-solid fa-upload text-sm"></i>
<span>데이터 불러오기</span>
</button>
</div>
<button class="w-full py-4 rounded-xl bg-scholar-card border border-scholar-border flex items-center justify-center space-x-2 font-bold">
<i class="fa-regular fa-circle-question"></i>
<span>사용법 가이드(도움말) 가져오기</span>
</button>
<button class="w-full py-4 rounded-xl bg-scholar-card border border-scholar-border flex items-center justify-center space-x-2 text-scholar-blue font-bold">
<i class="fa-solid fa-circle-plus"></i>
<span>디자인 현재상태 백업 (Auto-timestamp)</span>
</button>
<div class="flex items-center space-x-2 mt-2">
<div class="flex-1 flex items-center bg-black/30 border border-scholar-border rounded-lg px-3 py-3">
<span class="text-xs text-gray-500 truncate">백업 저장할 외부 폴더 선택...</span>
<i class="fa-solid fa-folder text-yellow-500 ml-auto"></i>
</div>
<button class="bg-scholar-blue text-white px-4 py-3 rounded-lg font-bold text-sm whitespace-nowrap">백업실행</button>
</div>
</div>
</section>
<!-- END: Section 2 -->
<!-- BEGIN: Section 3 - Cloud Sync & Restore (Based on IMAGE_14) -->
<section class="space-y-6 pb-8" data-purpose="cloud-and-restore-settings">
<!-- Restore Button -->
<button class="w-full py-4 rounded-xl border border-red-900/30 bg-red-900/5 flex items-center justify-center space-x-2 text-red-400 font-bold">
<i class="fa-solid fa-rotate-right"></i>
<span>최신 디자인 환경 복원 (One-click)</span>
</button>
<!-- Past Restore Point -->
<div class="space-y-4">
<div class="flex justify-between items-center px-1">
<h3 class="text-sm font-semibold text-gray-400">과거 시점 복원 선택 (Restore)</h3>
<button class="text-[10px] text-yellow-500 flex items-center space-x-1">
<i class="fa-solid fa-folder"></i>
<span>백업 폴더 열기</span>
</button>
</div>
<div class="py-10 text-center text-xs text-gray-600 italic">
          백업 내역이 없습니다.
        </div>
</div>
<!-- Custom Path Select -->
<div class="space-y-2">
<h3 class="text-sm font-semibold text-gray-400 ml-1">외부 폴더 직접 선택 (Custom Path)</h3>
<div class="flex items-center space-x-2">
<div class="flex-1 flex items-center bg-black/30 border border-scholar-border rounded-lg px-3 py-3">
<span class="text-xs text-gray-500">직접 경로 또는 폴더 선택...</span>
<i class="fa-solid fa-folder text-yellow-500 ml-auto"></i>
</div>
<button class="bg-scholar-blue text-white px-6 py-3 rounded-lg font-bold text-sm">실행</button>
</div>
</div>
<!-- Cloud Sync Card -->
<div class="bg-scholar-card rounded-2xl border border-scholar-border p-5 space-y-5">
<div class="flex items-center space-x-2 text-lg font-bold">
<i class="fa-solid fa-cloud-arrow-up text-scholar-blue"></i>
<span>개인용 클라우드 동기화 (GitHub)</span>
</div>
<div class="space-y-2">
<label class="text-xs text-gray-400 ml-1">GitHub Personal Access Token</label>
<div class="flex items-center bg-black/40 border border-scholar-border rounded-xl px-4 py-3">
<input class="bg-transparent border-none focus:ring-0 text-scholar-blue w-full p-0" type="password" value="••••••••••••••••••••••••••••••••••••"/>
<i class="fa-solid fa-ellipsis-h text-red-500 text-xs ml-2"></i>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-xs text-gray-400 ml-1">Owner (ID)</label>
<div class="bg-black/40 border border-scholar-border rounded-xl px-4 py-3">
<span class="font-bold text-white">ghkim365</span>
</div>
</div>
<div class="space-y-2">
<label class="text-xs text-gray-400 ml-1">Repo Name</label>
<div class="bg-black/40 border border-scholar-border rounded-xl px-4 py-3 overflow-hidden">
<span class="font-bold bg-blue-700 text-white px-1">study-player</span>
</div>
</div>
</div>
<button class="w-full py-4 rounded-2xl bg-scholar-blue flex items-center justify-center space-x-2 text-white font-bold shadow-lg shadow-scholar-blue/20">
<i class="fa-solid fa-cloud-arrow-up"></i>
<span>지금 동기화 실행</span>
</button>
<div class="text-center">
<span class="text-[10px] text-gray-500">마지막 동기화: 2026. 4. 19. 오후 2:29:15</span>
</div>
</div>
</section>
<!-- END: Section 3 -->
</main>
<!-- END: Scrollable Content Container -->
<!-- BEGIN: Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-scholar-dark border-t border-scholar-border px-6 py-3 flex justify-between items-center z-50">
<div class="flex flex-col items-center space-y-1 opacity-50">
<i class="fa-solid fa-play text-xl"></i>
<span class="text-[10px]">학습</span>
</div>
<div class="flex flex-col items-center space-y-1 opacity-50">
<i class="fa-solid fa-list-ul text-xl"></i>
<span class="text-[10px]">목록</span>
</div>
<div class="flex flex-col items-center space-y-1 opacity-50">
<i class="fa-solid fa-circle-plus text-xl"></i>
<span class="text-[10px]">추가</span>
</div>
<div class="flex flex-col items-center space-y-1 text-scholar-blue">
<i class="fa-solid fa-gear text-xl"></i>
<span class="text-[10px] font-bold">설정</span>
</div>
</nav>
<!-- END: Bottom Navigation Bar -->
</body></html>
